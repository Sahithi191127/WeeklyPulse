name: Weekly Pulse (Staging)

on:
  workflow_dispatch:
    inputs:
      iso_week:
        description: "ISO week to run (YYYY-Www)"
        required: true
        default: "2026-W24"

concurrency:
  group: weekly-pulse-staging-${{ github.event.inputs.iso_week }}
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PULSE_ENV: staging
      PULSE_EMAIL_MODE: draft
      MCP_SERVER_URL: https://web-production-c5ea8.up.railway.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pulse
        run: pip install -e ".[dev]"

      - name: Staging preflight
        run: pulse config validate --secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          PULSE_EMAIL_TO: ${{ secrets.PULSE_EMAIL_TO }}

      - name: Staging run
        run: pulse run --product groww --iso-week "${{ github.event.inputs.iso_week }}" --email-mode draft
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          PULSE_EMAIL_TO: ${{ secrets.PULSE_EMAIL_TO }}

      - name: Quality gate
        run: pulse quality-gate --product groww --iso-week "${{ github.event.inputs.iso_week }}"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          PULSE_EMAIL_TO: ${{ secrets.PULSE_EMAIL_TO }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-staging-${{ github.event.inputs.iso_week }}
          path: |
            data/runs/
            data/ledger.sqlite
          if-no-files-found: ignore
