# Groww product configuration — see DOC/Architecture.md §11
# Local/staging: default_mode draft. Production scheduler sets PULSE_ENV=production
# and PULSE_EMAIL_MODE (see .env.production.example, DOC/runbook.md).
product: groww
display_name: Groww

play_store:
  app_id: com.nextbillion.groww  # verify at build time

ingestion:
  window_weeks: 10
  min_reviews: 20
  max_reviews: 5000
  min_words: 8
  allowed_language: en

delivery:
  # Override via GOOGLE_DOC_ID env or GitHub secret in CI (see DOC/deployment-plan.md)
  google_doc_id: "REPLACE_WITH_DOC_ID"
  email:
    recipients:
      - product-leads@example.com
    default_mode: draft  # draft | send
    from: pulse-sender@yourcompany.com  # Gmail OAuth account on hosted MCPServer (Railway)
